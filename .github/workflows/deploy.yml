name: Deploy to GKE (DEV)
on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
    paths:
      - "k8s/**"
  repository_dispatch:
    types: [deploy]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # required for OIDC to GCP
    env:
      K8S_NS: mcart-dev
    steps:
      - uses: actions/checkout@v4

      # 1) Auth to GCP with OIDC (set these in repo/secrets)
      - id: auth
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      # 2) Fetch kubeconfig for GKE
      - uses: google-github-actions/get-gke-credentials@v3
        with:
          cluster_name: ${{ secrets.GKE_CLUSTER }}
          location:     ${{ secrets.GKE_LOCATION }}

      # 3) Namespace (idempotent)
      - name: Ensure namespace
        run: kubectl get ns $K8S_NS || kubectl create ns $K8S_NS

      # 4) Secrets (idempotent apply)
      - name: Apply secrets
        run: |
          kubectl -n $K8S_NS delete secret catalog-secrets --ignore-not-found
          kubectl -n $K8S_NS create secret generic catalog-secrets \
            --from-literal=DB_USER=${{ secrets.DB_USER }} \
            --from-literal=DB_PASS='${{ secrets.DB_PASS }}'
          kubectl -n $K8S_NS delete secret search-secrets --ignore-not-found
          kubectl -n $K8S_NS create secret generic search-secrets \
            --from-literal=ES_API_KEY='${{ secrets.ES_API_KEY }}'

      # 5) Apply workloads
      - name: K8s apply (catalog/search/ingress)
        run: |
          kubectl -n $K8S_NS apply -f k8s/catalog.yaml
          kubectl -n $K8S_NS apply -f k8s/search.yaml
          kubectl -n $K8S_NS apply -f k8s/ingress.yaml

      # 6) Wait for rollouts and surface failures
      - name: Wait for rollouts
        run: |
          set -e
          kubectl -n $K8S_NS rollout status deploy/catalog-api --timeout=120s
          kubectl -n $K8S_NS rollout status deploy/search-api --timeout=120s