apiVersion: apps/v1
kind: Deployment
metadata:
  name: search-api
  namespace: mcart-dev
spec:
  replicas: 2
  selector:
    matchLabels: { app: search-api }
  template:
    metadata:
      labels: { app: search-api }
    spec:
      containers:
        - name: app
          image: ghcr.io/kirarhemant/search-api:main
          imagePullPolicy: Always #changed from IfNotPresent
          env:
            - name: ES_URL
              value: "https://31a8c5124ac34f5cb1796eb7065b67d9.us-central1.gcp.cloud.es.io:443"
            - name: ES_API_KEY
              valueFrom: { secretKeyRef: { name: search-secrets, key: ES_API_KEY } }
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet: { path: /actuator/health, port: 8080 }
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests: { cpu: "100m", memory: "256Mi" }
            limits:   { cpu: "500m", memory: "512Mi" }
---
apiVersion: v1
kind: Service
metadata:
  name: search-svc
  namespace: mcart-dev
spec:
  selector: { app: search-api }
  ports:
    - port: 80
      targetPort: 8080