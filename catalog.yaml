apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalog-api
  namespace: mcart-dev
spec:
  replicas: 2
  selector:
    matchLabels: { app: catalog-api }
  template:
    metadata:
      labels: { app: catalog-api }
    spec:
      containers:
        - name: app
          image: ghcr.io/kirarhemant/catalog-api:main
          imagePullPolicy: Always #changed from IfNotPresent
          env:
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://10.90.0.3:5432/mcart"
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom: { secretKeyRef: { name: catalog-secrets, key: DB_USER } }
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom: { secretKeyRef: { name: catalog-secrets, key: DB_PASS } }
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet: { path: /actuator/health, port: 8080 }
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests: { cpu: "100m", memory: "256Mi" }
            limits:   { cpu: "500m", memory: "512Mi" }
---
apiVersion: v1
kind: Service
metadata:
  name: catalog-svc
  namespace: mcart-dev
spec:
  selector: { app: catalog-api }
  ports:
    - port: 80
      targetPort: 8080